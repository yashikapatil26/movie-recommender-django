<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Movie Recommender</title>
</head>
<body class="bg-light">
    <div class="container py-5 text-center">
        <!-- If you don't see this title on your screen, the code isn't saved! -->
        <h1 class="display-4 mb-4">AI Movie Recommender</h1>
        
        <form method="GET" class="mb-5">
            <input type="text" name="movie_name" placeholder="Enter a movie you like..." class="form-control w-50 mx-auto">
            <button type="submit" class="btn btn-primary mt-3">Get Recommendations</button>
        </form>

        <div class="results-section">
            {% for movie in movies %}
                <div class="alert alert-success w-50 mx-auto shadow-sm">
                    <strong>Recommended:</strong> {{ movie }}
                </div>
            {% empty %}
                {% if request.GET.movie_name %}
                    <p class="text-muted">Processing your request...</p>
                {% endif %}
            {% endfor %}
        </div>
    </div>
</body>
</html>
